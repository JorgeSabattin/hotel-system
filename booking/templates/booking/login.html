{% extends "booking/base.html" %}
{% block title %}Grand Reserve · Iniciar sesión{% endblock %}

{% block extra_styles %}
<style>
    .auth-wrapper {
        max-width: 420px;
        margin: 0 auto;
    }
    .auth-card {
        background: var(--white);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 44px 40px;
        box-shadow: 0 4px 32px rgba(26,23,20,0.06);
    }
    .auth-card h2 {
        font-family: 'Cormorant Garamond', serif;
        font-size: 1.4rem;
        font-weight: 400;
        margin-bottom: 28px;
        padding-bottom: 16px;
        border-bottom: 1px solid var(--border);
    }
    .auth-card .btn { width: 100%; text-align: center; }
    .auth-footer {
        text-align: center;
        margin-top: 20px;
        font-size: 0.83rem;
        color: var(--muted);
    }
    /* Django form styles */
    .auth-card p label {
        display: block;
        font-size: 0.72rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 8px;
    }
    .auth-card ul { list-style: none; padding: 0; }
    .auth-card ul li {
        font-size: 0.82rem;
        color: var(--error);
        margin-bottom: 4px;
    }
</style>
{% endblock %}

{% block content %}
<div class="page-header">
    <p class="eyebrow">Acceso</p>
    <h1>Bienvenido de vuelta</h1>
</div>

<div class="auth-wrapper">
    <div class="auth-card">
        <h2>Iniciar sesión</h2>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn">Entrar</button>
        </form>
    </div>
    <div class="auth-footer">
        ¿No tienes cuenta? <a href="/register/">Regístrate aquí</a>
    </div>
</div>
{% endblock %}
