{% extends "booking/base.html" %}
{% block title %}Grand Reserve · Crear cuenta{% endblock %}

{% block extra_styles %}
<style>
    .auth-wrapper {
        max-width: 480px;
        margin: 0 auto;
    }
    .auth-card {
        background: var(--white);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 44px 40px;
        box-shadow: 0 4px 32px rgba(26,23,20,0.06);
    }
    .auth-card h2 {
        font-family: 'Cormorant Garamond', serif;
        font-size: 1.4rem;
        font-weight: 400;
        margin-bottom: 28px;
        padding-bottom: 16px;
        border-bottom: 1px solid var(--border);
    }
    .auth-card .btn { width: 100%; text-align: center; }
    .auth-footer {
        text-align: center;
        margin-top: 20px;
        font-size: 0.83rem;
        color: var(--muted);
    }
    .auth-card p label {
        display: block;
        font-size: 0.72rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 8px;
    }
    .auth-card ul { list-style: none; padding: 0; }
    .auth-card ul li {
        font-size: 0.82rem;
        color: var(--error);
        margin-bottom: 4px;
    }
    .help-text {
        font-size: 0.78rem;
        color: var(--muted);
        margin-top: -14px;
        margin-bottom: 16px;
        line-height: 1.5;
    }
</style>
{% endblock %}

{% block content %}
<div class="page-header">
    <p class="eyebrow">Registro</p>
    <h1>Crear cuenta</h1>
</div>

<div class="auth-wrapper">
    <div class="auth-card">
        <h2>Datos de acceso</h2>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn">Crear cuenta</button>
        </form>
    </div>
    <div class="auth-footer">
        ¿Ya tienes cuenta? <a href="/login/">Iniciar sesión</a>
    </div>
</div>
{% endblock %}
